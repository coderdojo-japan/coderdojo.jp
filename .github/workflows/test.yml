name: actions
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  # Allows you to run this workflow manually from the Actions tab
  # https://docs.github.com/en/actions/managing-workflow-runs/manually-running-a-workflow
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_HOST: localhost
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      DATABASE_PORT: 5432
      TZ: Asia/Tokyo

    services:
      db:
        image: postgres:10.4-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password

    steps:
      - name: ☑️ Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: 🧪 Prepare DB
        run: |
          bundle exec rails db:create
          bundle exec rails db:setup

      - name: 🔧 Test
        run: bundle exec rspec spec

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    # TODO: This workflows depend on Ubuntu version.
    # https://github.com/AkhileshNS/heroku-deploy/issues/186
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      # heroku-deploy は v3 に固定する。v4 は push 先を refs/head/main と組み立てており
      # (正しくは refs/heads/main)、Heroku 側が main への push と認識できずに
      # `Pushed to branch other than [main, master], skipping build.` としてビルドを
      # スキップする。push 自体は成功するため Actions は success と表示され、
      # デプロイされていないことに気付けない。branch 入力を指定しても解消しない。
      # 詳細は PR #1847 / #1848 を参照。
      - uses: akhileshns/heroku-deploy@v3.15.15
        with:
          heroku_api_key:  ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email:    ${{ secrets.HEROKU_EMAIL }}
